{% extends 'base.html' %}

{% block content %}
<!-- Floating VolleyHub Label -->
<div class="floating-label">
    <div class="label-bar">
        <svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="5"/>
            <path d="M50 4 C50 4, 30 30, 50 50 C70 70, 50 96, 50 96" stroke="currentColor" stroke-width="4" fill="none"/>
            <path d="M8 30 C8 30, 40 35, 50 50 C60 65, 92 70, 92 70" stroke="currentColor" stroke-width="4" fill="none"/>
            <path d="M8 70 C8 70, 40 65, 50 50 C60 35, 92 30, 92 30" stroke="currentColor" stroke-width="4" fill="none"/>
        </svg>
        VolleyHub
    </div>
</div>

<!-- Hero Banner -->
<div style="
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 32px;
    animation: fadeUp 0.7s ease-out both;
">
    <div style="
        background: linear-gradient(135deg, rgba(28,28,30,0.85) 0%, rgba(58,58,60,0.78) 40%, rgba(72,72,74,0.7) 100%), url('https://images.unsplash.com/photo-1612872087720-bb876e2e67d1?w=1600&h=500&fit=crop') center/cover no-repeat;
        padding: 48px 40px;
        position: relative;
        overflow: hidden;
        min-height: 220px;
    ">
        <div style="
            position: absolute;
            top: -40px; right: -20px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: rgba(88, 86, 214, 0.15);
            filter: blur(60px);
        "></div>
        <div style="
            position: absolute;
            bottom: -60px; left: 30%;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(0, 122, 255, 0.1);
            filter: blur(50px);
        "></div>
        <div style="
            position: absolute;
            right: 40px; top: 50%;
            transform: translateY(-50%);
            opacity: 0.08;
        ">
            <svg width="180" height="180" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </div>

        <div style="position: relative; z-index: 1;">
            <div style="
                display: inline-block;
                padding: 4px 12px;
                border-radius: 100px;
                font-size: 0.7rem;
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                background: rgba(255, 255, 255, 0.12);
                color: rgba(255, 255, 255, 0.7);
                border: 1px solid rgba(255, 255, 255, 0.1);
                margin-bottom: 16px;
            ">&#128197; Schedule</div>

            <h2 style="
                font-weight: 700;
                font-size: 2rem;
                color: #fff;
                letter-spacing: -0.03em;
                line-height: 1.15;
                margin-bottom: 8px;
            ">Upcoming Events</h2>

            <p style="
                font-size: 0.95rem;
                color: rgba(255, 255, 255, 0.55);
                font-weight: 400;
                margin-bottom: 24px;
                max-width: 420px;
            ">All scheduled practices, games, and tournaments across every team.</p>

            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <a href="{% url 'team_list' %}" style="
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    padding: 10px 22px;
                    border-radius: 100px;
                    font-family: inherit;
                    font-size: 0.85rem;
                    font-weight: 500;
                    text-decoration: none;
                    color: rgba(255, 255, 255, 0.9);
                    background: rgba(255, 255, 255, 0.12);
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    transition: all 0.25s ease;
                ">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back to Teams
                </a>
            </div>
        </div>
    </div>

    <div style="
        height: 3px;
        background: linear-gradient(90deg, transparent, rgba(88, 86, 214, 0.3), rgba(0, 122, 255, 0.2), transparent);
    "></div>
</div>

{% if has_events %}
<div class="glass-card-dark" style="padding: 32px; border-radius: var(--radius-lg);">
    <div id='calendar'></div>
</div>

<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            headerToolbar: {
                left: 'title',
                right: 'prev,next today'
            },
            height: 700,
            events: {{ events_json_str|safe }},
            eventTimeFormat: {
                hour: 'numeric',
                minute: '2-digit',
                meridiem: 'short'
            },
            eventClick: function(info) {
                // Let native link action propagate (since we provide url)
            }
        });
        calendar.render();
    });
</script>

<style>
    /* FullCalendar Glassmorphism Dark Theme Overrides */
    :root {
        --fc-border-color: rgba(255, 255, 255, 0.08);
        --fc-page-bg-color: transparent;
        --fc-neutral-bg-color: rgba(255, 255, 255, 0.02);
        --fc-neutral-text-color: rgba(255, 255, 255, 0.8);
        --fc-today-bg-color: rgba(255, 255, 255, 0.05);
        --fc-event-border-color: transparent;
        --fc-button-bg-color: rgba(255, 255, 255, 0.05);
        --fc-button-border-color: rgba(255, 255, 255, 0.1);
        --fc-button-text-color: rgba(255, 255, 255, 0.9);
        --fc-button-hover-bg-color: rgba(255, 255, 255, 0.1);
        --fc-button-hover-border-color: rgba(255, 255, 255, 0.2);
        --fc-button-active-bg-color: rgba(255, 255, 255, 0.15);
        --fc-button-active-border-color: rgba(255, 255, 255, 0.25);
    }

    #calendar a {
        color: inherit;
        text-decoration: none;
    }

    .fc-theme-standard th {
        border-color: rgba(255, 255, 255, 0.1) !important;
        background: rgba(255, 255, 255, 0.03);
        padding: 12px 0;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.5px;
    }

    .fc-theme-standard td, .fc-theme-standard .fc-scrollgrid {
        border-color: rgba(255, 255, 255, 0.1) !important;
    }

    .fc-toolbar-title {
        font-weight: 700 !important;
        font-size: 1.5rem !important;
        letter-spacing: -0.02em;
    }

    .fc .fc-button-primary {
        box-shadow: none !important;
        border-radius: 8px;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        padding: 8px 16px;
    }

    .fc-event {
        border-radius: 6px;
        padding: 2px 4px;
        margin: 2px 0;
        font-size: 0.75rem;
        transition: transform 0.15s ease;
        border: 1px solid !important;
    }
    
    .fc-event:hover {
        transform: scale(1.02);
        z-index: 5;
    }

    .fc-daygrid-day-number {
        font-weight: 600;
        padding: 8px 12px !important;
    }
</style>

{% else %}
<div class="glass-card-dark">
    <div class="empty-state">
        <div class="empty-icon">&#128197;</div>
        <p>No upcoming events scheduled.</p>
        <a href="{% url 'team_list' %}" class="btn btn-success btn-lg">View Teams to Add Events</a>
    </div>
</div>
{% endif %}
{% endblock %}
