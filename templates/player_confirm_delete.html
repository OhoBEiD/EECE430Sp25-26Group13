{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Remove Player</h2>
    <p class="subtitle">This action cannot be undone</p>
</div>

<div class="glass-card" style="max-width: 520px;">
    <div style="text-align: center; padding: 20px 0;">
        <div style="
            width: 64px; height: 64px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(255, 59, 48, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.12);
            display: flex; align-items: center; justify-content: center;
        ">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/>
                <line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
        </div>
        <p style="font-size: 1.1rem; font-weight: 500; margin-bottom: 6px; color: var(--text-primary);">
            Delete <strong>{{ player.name }}</strong>?
        </p>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 28px;">
            This player will be permanently removed from the roster.
        </p>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <form method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Yes, Delete
                </button>
            </form>
            <a href="{% url 'player_list' %}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
