{% comment %}
Shared dashboard hero. Inputs: eyebrow (str), title (str), subtitle (str), hero_image (optional URL).
{% endcomment %}
<div class="floating-label">
    <div class="label-bar">
        <svg width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="5"/>
            <path d="M50 4 C50 4, 30 30, 50 50 C70 70, 50 96, 50 96" stroke="currentColor" stroke-width="4" fill="none"/>
            <path d="M8 30 C8 30, 40 35, 50 50 C60 65, 92 70, 92 70" stroke="currentColor" stroke-width="4" fill="none"/>
            <path d="M8 70 C8 70, 40 65, 50 50 C60 35, 92 30, 92 30" stroke="currentColor" stroke-width="4" fill="none"/>
        </svg>
        VolleyHub
    </div>
</div>

<div style="position: relative; border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 32px; animation: fadeUp 0.7s ease-out both;">
    <div style="{% if hero_image %}background: linear-gradient(135deg, rgba(28,28,30,0.85) 0%, rgba(58,58,60,0.78) 40%, rgba(72,72,74,0.7) 100%), url('{{ hero_image }}') center/cover no-repeat;{% else %}background: linear-gradient(135deg, #2c2c2e 0%, #3a3a3c 40%, #48484a 100%);{% endif %} padding: 48px 40px; position: relative; overflow: hidden; min-height: {% if hero_image %}260px{% else %}auto{% endif %};">
        <div style="position: absolute; top: -40px; right: -20px; width: 220px; height: 220px; border-radius: 50%; background: rgba(88, 86, 214, 0.15); filter: blur(60px);"></div>
        <div style="position: absolute; bottom: -60px; left: 30%; width: 180px; height: 180px; border-radius: 50%; background: rgba(0, 122, 255, 0.1); filter: blur(50px);"></div>
        <div style="position: absolute; right: 40px; top: 50%; transform: translateY(-50%); opacity: 0.08;">
            <svg width="180" height="180" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="46" stroke="white" stroke-width="2.5"/>
                <path d="M50 4 C50 4, 30 30, 50 50 C70 70, 50 96, 50 96" stroke="white" stroke-width="2" fill="none"/>
                <path d="M8 30 C8 30, 40 35, 50 50 C60 65, 92 70, 92 70" stroke="white" stroke-width="2" fill="none"/>
                <path d="M8 70 C8 70, 40 65, 50 50 C60 35, 92 30, 92 30" stroke="white" stroke-width="2" fill="none"/>
            </svg>
        </div>

        <div style="position: relative; z-index: 1;">
            <div style="display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; background: rgba(255, 255, 255, 0.12); color: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 16px;">{{ eyebrow }}</div>

            <h2 style="font-weight: 700; font-size: 2rem; color: #fff; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 8px;">{{ title }}</h2>

            <p style="font-size: 0.95rem; color: rgba(255, 255, 255, 0.55); font-weight: 400; margin-bottom: 0; max-width: 480px;">{{ subtitle }}</p>
        </div>
    </div>
    <div style="height: 3px; background: linear-gradient(90deg, transparent, rgba(88, 86, 214, 0.3), rgba(0, 122, 255, 0.2), transparent);"></div>
</div>
