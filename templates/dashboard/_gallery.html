{% comment %}
Volleyball image strip — visual filler. Photos courtesy of Unsplash.
{% endcomment %}
<div style="margin-bottom: 32px;">
    <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px;">
        <h3 style="font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin: 0;">From around the courts</h3>
        <span style="font-size: 0.7rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.08em;">Photos · Unsplash</span>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;" class="stagger">
        <figure style="margin: 0; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/3; background: #1c1c1e;">
            <img src="https://images.unsplash.com/photo-1612872087720-bb876e2e67d1?w=800&h=600&fit=crop" alt="Volleyball on the court" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </figure>
        <figure style="margin: 0; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/3; background: #1c1c1e;">
            <img src="https://images.unsplash.com/photo-1666901356149-93f2eb3ba5a2?w=800&h=600&fit=crop" alt="Players warming up" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </figure>
        <figure style="margin: 0; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/3; background: #1c1c1e;">
            <img src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?w=800&h=600&fit=crop" alt="Volleyball action shot" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </figure>
        <figure style="margin: 0; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/3; background: #1c1c1e;">
            <img src="https://images.unsplash.com/photo-1592656094267-764a45160876?w=800&h=600&fit=crop" alt="Volleyball net silhouette" loading="lazy" style="width: 100%; height: 100%; object-fit: cover; display: block;">
        </figure>
    </div>
</div>
